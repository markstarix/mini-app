<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Rohan AI Mines</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>👑 Rohan AI Mines</h1>
      <p>Smart Signals for 1Win</p>
    </header>

    <div class="signal-area">
      <button id="getSignalBtn" class="signal-btn">
        🎮 Получить Новый Сигнал
      </button>
      <div id="timer" class="timer"></div>
    </div>

    <div class="grid" id="minesGrid"></div>

    <div class="info">
      <p><strong>Стратегия:</strong> Углы + Центр + Края</p>
      <p id="status" class="status">Готов к новому сигналу</p>
    </div>

    <div class="history">
      <h3>Последние сигналы</h3>
      <div id="historyList"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
