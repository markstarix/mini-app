<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>MINES MOD 2.0</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app">

  <!-- ─── Header ─────────────────────────────────────────── -->
  <header class="header">
    <div class="logo">
      <span class="logo-icon">💣</span>
      <span class="logo-text">MINES MOD 2.0</span>
    </div>
    <div class="header-right">
      <div class="balance-chip">
        <span class="coin-icon">🪙</span>
        <span id="balance" class="balance-val">10 000</span>
      </div>
      <button id="langBtn" class="lang-btn" aria-label="Change language">
        <span id="currentLangCode">GB</span>
      </button>
    </div>
  </header>

  <!-- ─── Multiplier bar ─────────────────────────────────── -->
  <div class="mult-bar">
    <div class="mult-col">
      <span data-i18n="multiplierLabel" class="mult-lbl">Multiplier</span>
      <span id="multiplier" class="mult-num">1.00×</span>
    </div>
    <div class="mult-divider"></div>
    <div class="mult-col right">
      <span data-i18n="potentialLabel" class="mult-lbl">Potential</span>
      <span id="potential" class="mult-pot">— 🪙</span>
    </div>
  </div>

  <!-- ─── Game grid ──────────────────────────────────────── -->
  <div class="grid-wrap">
    <div id="grid" class="grid"></div>
  </div>

  <!-- ─── Controls ──────────────────────────────────────── -->
  <div class="controls">

    <!-- Mine count -->
    <div class="ctrl-section">
      <span data-i18n="minesLabel" class="ctrl-label">💣 Number of Mines</span>
      <div class="seg-group" id="mineGroup">
        <button class="seg active" data-val="1">1</button>
        <button class="seg" data-val="3">3</button>
        <button class="seg" data-val="5">5</button>
        <button class="seg" data-val="8">8</button>
        <button class="seg" data-val="12">12</button>
      </div>
    </div>

    <!-- Bet amount -->
    <div class="ctrl-section">
      <span data-i18n="betLabel" class="ctrl-label">🪙 Bet (demo coins)</span>
      <div class="seg-group" id="betGroup">
        <button class="seg" data-val="50">50</button>
        <button class="seg active" data-val="100">100</button>
        <button class="seg" data-val="250">250</button>
        <button class="seg" data-val="500">500</button>
      </div>
    </div>

    <!-- Hint box (no disclaimer) -->
    <div class="hint-box" id="hintBox">
      <div class="hint-box-row">
        <span data-i18n="hintBoxTitle" class="hint-title">🔮 Hint</span>
        <span id="hintsLeft" class="hint-badge">3 / 3</span>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="action-row">
      <button id="startBtn" class="act-btn btn-start">🚀 Start</button>
      <button id="hintBtn"  class="act-btn btn-hint"  disabled>🔮 Hint</button>
      <button id="cashBtn"  class="act-btn btn-cash"  disabled>💰 Cash Out</button>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-item">
        <span id="statWins" class="stat-val green">0</span>
        <span data-i18n="winsLabel" class="stat-lbl">Wins</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <span id="statLosses" class="stat-val red">0</span>
        <span data-i18n="lossesLabel" class="stat-lbl">Losses</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-item">
        <span id="statProfit" class="stat-val neutral">±0</span>
        <span data-i18n="profitLabel" class="stat-lbl">Profit</span>
      </div>
    </div>

  </div><!-- /controls -->

</div><!-- /app -->

<!-- ─── Language selector overlay ─────────────────────── -->
<div id="langOverlay" class="lang-overlay hidden">
  <div id="langPanel" class="lang-panel">
    <div class="lang-panel-header">
      <span data-i18n="langTitle" class="lang-panel-title">Language</span>
      <button id="langClose" class="lang-close-btn">✕</button>
    </div>
    <div class="lang-list">
      <button class="lang-item active" data-lang="en">
        <span class="lang-code">GB</span>
        <span class="lang-name">English</span>
        <span class="lang-arrow">→</span>
      </button>
      <button class="lang-item" data-lang="hi">
        <span class="lang-code">IN</span>
        <span class="lang-name">हिन्दी</span>
        <span class="lang-arrow">→</span>
      </button>
      <button class="lang-item" data-lang="es">
        <span class="lang-code">ES</span>
        <span class="lang-name">Español</span>
        <span class="lang-arrow">→</span>
      </button>
      <button class="lang-item" data-lang="pt">
        <span class="lang-code">PT</span>
        <span class="lang-name">Português</span>
        <span class="lang-arrow">→</span>
      </button>
    </div>
  </div>
</div>

<!-- Toast notification -->
<div id="toast" class="toast"></div>

<!-- Confetti canvas (win effect) -->
<canvas id="confetti" class="confetti-canvas"></canvas>

<script src="js/app.js"></script>
</body>
</html>
